<div class="container-fluid vh-100">

    <div class="row h-100">
  
      <!-- Imagen -->
      <div class="col-md-6 d-none d-md-block p-0">
        <img
          src="https://static.studyusa.com/article/aws_9CZM8SOpRgaVQQ1MnX8HxiuLzY8AOMoD_sm_2x.jpg"
          alt="registro"
          class="img-fluid h-100 w-100 object-fit-cover">
      </div>
  
      <!-- Formulario -->
      <div class="col-md-6 d-flex justify-content-center align-items-center bg-light">
  
        <div class="card shadow-lg border-0 p-5" style="width: 420px; border-radius: 20px;">
  
          <div class="text-center mb-4">
            <h2 class="fw-bold">Crear Cuenta</h2>
            <p class="text-muted">Completa tus datos para registrarte</p>
          </div>
  
          <!-- Alerta de error -->
          <div *ngIf="error" class="alert alert-danger py-2 text-center" role="alert">
            {{ error }}
          </div>
  
          <!-- Nombre -->
          <div class="mb-3">
            <label class="form-label">Nombre completo</label>
            <input
              type="text"
              class="form-control form-control-lg"
              [(ngModel)]="nombre"
              placeholder="Ingrese su nombre completo">
          </div>
  
          <!-- Correo -->
          <div class="mb-3">
            <label class="form-label">Correo electrónico</label>
            <input
              type="email"
              class="form-control form-control-lg"
              [(ngModel)]="email"
              placeholder="Ingrese su correo">
          </div>
  
          <!-- Contraseña -->
          <div class="mb-3">
            <label class="form-label">Contraseña</label>
            <input
              type="password"
              class="form-control form-control-lg"
              [(ngModel)]="password"
              placeholder="Mínimo 6 caracteres">
          </div>
  
          <!-- Confirmar Contraseña -->
          <div class="mb-4">
            <label class="form-label">Confirmar contraseña</label>
            <input
              type="password"
              class="form-control form-control-lg"
              [(ngModel)]="confirmarPassword"
              placeholder="Repita su contraseña">
          </div>
  
          <!-- Botón Registrar -->
          <button
            class="btn btn-dark btn-lg w-100 mb-3"
            (click)="registrar()"
            [disabled]="cargando">
  
            <span
              *ngIf="cargando"
              class="spinner-border spinner-border-sm me-2"
              role="status">
            </span>
  
            {{ cargando ? 'Registrando...' : 'Registrarse' }}
  
          </button>
  
          <!-- Volver al login -->
          <div class="text-center text-muted mb-3">
            <small>¿Ya tienes una cuenta?</small>
          </div>
  
          <button
            class="btn btn-outline-dark btn-lg w-100"
            (click)="irALogin()"
            [disabled]="cargando">
            Iniciar Sesión
          </button>
  
        </div>
  
      </div>
  
    </div>
  
  </div>
